<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>الأدوات البلدية الموحدة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,Arial,sans-serif;background:#f4f6f8;color:#222;line-height:1.6}
.nav{display:flex;gap:6px;background:#fff;padding:8px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.nav button{flex:1;border:0;border-radius:10px;padding:13px 5px;color:#fff;font-weight:bold;font-size:14px;cursor:pointer}
.nav .a{background:#2563eb}.nav .b{background:#0b8457}.nav .c{background:#ff9800}
.tab{display:none;padding:12px}.tab.active{display:block}
.box,.card{background:#fff;border-radius:14px;padding:15px;margin:0 auto 14px;max-width:850px;box-shadow:0 2px 10px rgba(0,0,0,.12)}
h2,h3{text-align:center;margin-top:0;color:#0b5;margin-bottom:12px}
label{display:block;font-weight:bold;margin-top:12px;font-size:15px}
input,textarea,button{width:100%;padding:12px;margin-top:8px;border:1px solid #ccc;border-radius:9px;font-size:15px}
button{border:0;color:#fff;font-weight:bold;cursor:pointer}
.btn-blue{background:#2563eb}.btn-green{background:#25D366}.btn-orange{background:#ff9800}.btn-red{background:#c0392b}.btn-purple{background:#8e44ad}.btn-gray{background:#6c757d}
.hidden{display:none!important}
.note{font-size:13px;color:#555;text-align:center;margin-top:8px}
.counter{background:#e8f0fe;color:#1a73e8;padding:10px;border-radius:10px;text-align:center;font-weight:bold;margin-bottom:10px}
.search-row{display:flex;gap:8px}.search-row input{flex:1}.search-row button{width:110px}
.flex-row{display:flex;gap:8px;align-items:end}.flex-row>*{flex:1}
.result{background:#eefaf3;padding:12px;margin-top:15px;border-radius:10px;border:1px solid #b7e4c7}
.item{background:#f9fafb;border:1px solid #ddd;border-radius:12px;padding:12px;margin-top:10px}
.item div{margin-bottom:7px;word-break:break-word}
.out{background:#eef2ff}
#r_previewBox img{max-width:100%;max-height:250px;border-radius:10px;border:2px solid #ccc}
.paste-box{width:100%;min-height:120px;padding:12px;border:2px dashed #2563eb;border-radius:10px;background:#f8fbff;margin-top:8px;font-size:14px;resize:vertical}
.paste-box:focus{outline:none;border-color:#0b8457;background:#f0fff4}
.file-wrapper{position:relative;display:inline-block;width:100%}
.file-wrapper input[type=file]{position:absolute;left:0;top:0;width:100%;height:100%;opacity:0;cursor:pointer}
.file-btn{display:block;width:100%;padding:12px;background:#e8f0fe;color:#1a73e8;border:2px dashed #1a73e8;border-radius:9px;text-align:center;font-weight:bold;cursor:pointer;margin-top:8px}
.file-btn:active{background:#d2e3fc}
.status-ok{color:#0b8457;font-weight:bold}
.status-err{color:#c0392b;font-weight:bold}
@media(max-width:520px){.nav button{font-size:12px;padding:11px 3px}.search-row,.flex-row{display:block}.search-row button{width:100%;margin-top:8px}}
</style>
</head>
<body>

  <button class="a" onclick="showTab('tabOCR')">📷 تحليل</button>

      <input type="file" id="o_excelReq" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" capture="filesystem">
    </div>

    <label>📥 رفع Excel البلاغات</label>
    <div class="file-wrapper">
      <div class="file-btn" id="o_incBtn">اضغط لاختيار ملف Excel البلاغات</div>
      <input type="file" id="o_excelInc" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" capture="filesystem">

    <h2>بحث البلاغ وإرسال واتساب</h2>

<!-- الطلبات -->
<div id="tabOrders" class="tab">
  <div class="box">
    <h2>بحث الطلبات وإرسال واتساب</h2>

    <label>📥 إرفاق جدول Excel</label>
    <div class="file-wrapper">
      <div class="file-btn" id="q_excelBtn">اضغط لاختيار ملف Excel</div>
      <input type="file" id="q_excel" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" capture="filesystem">
    </div>
    <p id="q_excelStatus" class="note"></p>

<script>
/* ===================== دوال عامة ===================== */
function showTab(id){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function clean(v){return String(v||"").trim()}
function cleanKey(v){return clean(v).replace(/\s/g,'').toLowerCase()}
function findCol(row,names){
  const keys=Object.keys(row||{});
  for(const n of names){
    const f=keys.find(k=>cleanKey(k)===cleanKey(n));
    if(f)return f;
  }
  return null;
}
function phoneFix(p){
  p=clean(p).replace(/\D/g,'');
  if(p.startsWith('966'))return p;
  if(p.startsWith('05'))return '966'+p.substring(1);
  if(p.startsWith('5')&&p.length===9)return '966'+p;
  return p;
}
function readExcelFile(file,cb,msgEl){
  const r=new FileReader();
  r.onload=function(e){
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:""});
      cb(rows);
    }catch(err){ if(msgEl) msgEl.textContent="خطأ في قراءة Excel"; else alert("خطأ في قراءة Excel"); }
  };
  r.readAsArrayBuffer(file);
}
function normalizeREQ(raw){
  let s=clean(raw).toUpperCase().replace(/\s+/g,'').replace(/REO/g,'REQ');
  const m=s.match(/REQ-?\d{2}-?\d{2}-?\d{5,6}/);
  if(!m)return "";
  return m[0].replace(/^REQ-?/,'REQ-').replace(/REQ-(\d{2})-?(\d{2})-?(\d+)/,'REQ-$1-$2-$3');
}
function normalizeINC(raw){
  let s=clean(raw).toUpperCase().replace(/\s+/g,'');
  const m=s.match(/INC-?\d{2}-?\d{2}-?\d{5,6}/);
  if(!m)return "";
  return m[0].replace(/^INC-?/,'INC-').replace(/INC-(\d{2})-?(\d{2})-?(\d+)/,'INC-$1-$2-$3');
}

/* تحويل نص لصق من Excel إلى صفوف */
function parsePasteText(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const headers=lines[0].split('\t');
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const cells=lines[i].split('\t');
    const row={};
    headers.forEach((h,idx)=>{row[h]=cells[idx]||""});
    rows.push(row);
  }
  return rows;
}

/* تحديث اسم الزر بعد اختيار الملف */
function setupFileBtn(inputId, btnId, statusId){
  const input=document.getElementById(inputId);
  const btn=document.getElementById(btnId);
  const status=document.getElementById(statusId);
  if(!input||!btn)return;
  input.addEventListener('change',function(e){
    const f=e.target.files[0];
    if(f){
      btn.textContent='✅ '+f.name;
      btn.style.background='#d4edda';
      btn.style.borderColor='#28a745';
      btn.style.color='#155724';
      if(status)status.textContent='تم اختيار: '+f.name;
    }
  });
}

/* ===================== تحليل ===================== */
let oReqRows=[],oIncRows=[],oFile=null;
let oSaved=JSON.parse(localStorage.getItem("oSaved")||"[]");
function o_count(){document.getElementById("o_counter").textContent="عدد المحفوظات: "+oSaved.length}
o_count();

setupFileBtn('o_excelReq','o_reqBtn','o_reqStatus');
setupFileBtn('o_excelInc','o_incBtn','o_incStatus');
setupFileBtn('o_file','o_fileBtn',null);

document.getElementById("o_excelReq").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f)return;
  readExcelFile(f,rows=>{oReqRows=rows;document.getElementById("o_reqStatus").textContent="تم تحميل طلبات: "+rows.length},document.getElementById("o_reqStatus"));
});
document.getElementById("o_excelInc").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f)return;
  readExcelFile(f,rows=>{oIncRows=rows;document.getElementById("o_incStatus").textContent="تم تحميل بلاغات: "+rows.length},document.getElementById("o_incStatus"));
});
document.getElementById("o_file").addEventListener("change",e=>{oFile=e.target.files[0]||null});

/* تحليل من لصق */
function o_pasteAnalyze(){
  const paste=document.getElementById("o_paste").value.trim();
  if(!paste){alert("الصق البيانات أولاً");return}

  // محاولة استخراج رقم من النص
  let req=normalizeREQ(paste);
  let inc=normalizeINC(paste);

  if(!req&&!inc){
    // إذا ما لقى رقم، حاول يحلل كجدول
    const rows=parsePasteText(paste);
    if(rows.length>0){
      oReqRows=rows;
      document.getElementById("o_status").textContent="✅ تم تحميل "+rows.length+" صف من اللصق";
      document.getElementById("o_status").className="note status-ok";
      return;
    }
    alert("لم يتم العثور على رقم صحيح أو بيانات جدول");
    return;
  }

  // يبحث في البيانات المحملة
  let row=null,type="",saveKey=req||inc;
  if(req){
    row=oReqRows.find(r=>normalizeREQ(r[findCol(r,["رقم الطلب","رقمالطلب"])])===req);
    if(row)type="طلب";
  }
  if(!row&&inc){
    row=oIncRows.find(r=>normalizeINC(r[findCol(r,["رقم البلاغ","رقمالبلاغ"])])===inc);
    if(row)type="بلاغ";
  }
  if(!row){document.getElementById("o_status").textContent="❌ غير موجود في البيانات المحملة";document.getElementById("o_status").className="note status-err";return}

  const linkCol=type==="طلب"?findCol(row,["الموقع","موقع الطلب"]):findCol(row,["موقع البلاغ","الموقع"]);
  const benefCol=findCol(row,["رقم المستفيد","المستفيد"]);
  const phoneCol=findCol(row,["رقم الجوال","رقم جوال المستفيد","الجوال"]);
  const muniCol=findCol(row,["البلدية الفرعية"]);

  document.getElementById("o_no").value=saveKey;
  document.getElementById("o_link").value=clean(row[linkCol]);
  document.getElementById("o_benef").value=clean(row[benefCol]);
  document.getElementById("o_phone").value=clean(row[phoneCol]);
  document.getElementById("o_muni").value=clean(row[muniCol]);

  if(!oSaved.some(x=>x["رقم"]===saveKey)){
    oSaved.push({"رقم":saveKey,"البلدية الفرعية":clean(row[muniCol]),"الموقع":clean(row[linkCol]),"رقم المستفيد":clean(row[benefCol]),"رقم الجوال":clean(row[phoneCol]),"النوع":type,"تاريخ الحفظ":new Date().toLocaleString("ar-SA")});
    localStorage.setItem("oSaved",JSON.stringify(oSaved));o_count();
  }
  document.getElementById("o_status").textContent="✅ تم العثور ("+type+") — تم الحفظ تلقائياً";
  document.getElementById("o_status").className="note status-ok";
}

async function o_analyze(){
  let raw=document.getElementById("o_manual").value, req="", inc="";
  if(raw){req=normalizeREQ(raw);inc=normalizeINC(raw)}
  else{
    if(!oFile){alert("أدخل رقم أو ارفع صورة");return}
    if(oFile.type.startsWith("video/")){alert("تحليل الرقم يعمل على الصور فقط");return}
    document.getElementById("o_status").textContent="جاري قراءة الصورة...";
    const res=await Tesseract.recognize(oFile,"eng",{logger:m=>{if(m.progress)document.getElementById("o_status").textContent="جاري التحليل "+Math.round(m.progress*100)+"%"}});
    req=normalizeREQ(res.data.text); inc=normalizeINC(res.data.text);
  }
  if(!req&&!inc){alert("لم يتم استخراج رقم صحيح");return}
  let row=null,type="",saveKey=req||inc;
  if(req){
    row=oReqRows.find(r=>normalizeREQ(r[findCol(r,["رقم الطلب","رقمالطلب"])])===req);
    if(row)type="طلب";
  }
  if(!row&&inc){
    row=oIncRows.find(r=>normalizeINC(r[findCol(r,["رقم البلاغ","رقمالبلاغ"])])===inc);
    if(row)type="بلاغ";
  }
  if(!row){document.getElementById("o_status").textContent="❌ غير موجود في Excel";document.getElementById("o_status").className="note status-err";return}

  const linkCol=type==="طلب"?findCol(row,["الموقع","موقع الطلب"]):findCol(row,["موقع البلاغ","الموقع"]);
  const benefCol=findCol(row,["رقم المستفيد","المستفيد"]);
  const phoneCol=findCol(row,["رقم الجوال","رقم جوال المستفيد","الجوال"]);
  const muniCol=findCol(row,["البلدية الفرعية"]);

  document.getElementById("o_no").value=saveKey;
  document.getElementById("o_link").value=clean(row[linkCol]);
  document.getElementById("o_benef").value=clean(row[benefCol]);
  document.getElementById("o_phone").value=clean(row[phoneCol]);
  document.getElementById("o_muni").value=clean(row[muniCol]);

  if(!oSaved.some(x=>x["رقم"]===saveKey)){
    oSaved.push({"رقم":saveKey,"البلدية الفرعية":clean(row[muniCol]),"الموقع":clean(row[linkCol]),"رقم المستفيد":clean(row[benefCol]),"رقم الجوال":clean(row[phoneCol]),"النوع":type,"تاريخ الحفظ":new Date().toLocaleString("ar-SA")});
    localStorage.setItem("oSaved",JSON.stringify(oSaved));o_count();
  }
  document.getElementById("o_status").textContent="✅ تم العثور ("+type+") — تم الحفظ تلقائياً";
  document.getElementById("o_status").className="note status-ok";
}

async function o_share(){
  const text=`رقم: ${document.getElementById("o_no").value}
البلدية الفرعية: ${document.getElementById("o_muni").value}
رقم المستفيد: ${document.getElementById("o_benef").value}
رقم الجوال: ${document.getElementById("o_phone").value}
الموقع: ${document.getElementById("o_link").value}`;
  if(oFile&&navigator.canShare&&navigator.canShare({files:[oFile]})){await navigator.share({files:[oFile],text});}
  else{location.href="https://wa.me/?text="+encodeURIComponent(text)}
}
function o_export(){exportRows(oSaved,"التحليل_المحفوظ.xlsx","التحليل")}


/* ===================== البلاغات ===================== */
let rRows=[],rRow=null,rImgData=null,rImgFile=null;
let rSaved=JSON.parse(localStorage.getItem("rSaved")||"[]");

setupFileBtn('r_excel','r_excelBtn','r_excelStatus');
setupFileBtn('r_img','r_imgBtn',null);

document.getElementById("r_excel").addEventListener("change",e=>{
  const f=e.target.files[0];if(!f)return;
  readExcelFile(f,rows=>{rRows=rows;document.getElementById("r_form").classList.remove("hidden");document.getElementById("r_excelStatus").textContent="تم تحميل: "+rows.length;document.getElementById("r_excelStatus").className="note status-ok"},document.getElementById("r_excelStatus"));
});
document.getElementById("r_img").addEventListener("change",e=>{
  rImgFile=e.target.files[0];if(!rImgFile)return;
  const fr=new FileReader();fr.onload=ev=>{rImgData=ev.target.result;document.getElementById("r_previewImg").src=rImgData;document.getElementById("r_previewBox").classList.remove("hidden")};fr.readAsDataURL(rImgFile);
});
function r_removeImg(){rImgData=null;rImgFile=null;document.getElementById("r_img").value="";document.getElementById("r_previewBox").classList.add("hidden")}

/* تحميل من لصق */
function r_pasteLoad(){
  const paste=document.getElementById("r_paste").value.trim();
  if(!paste){alert("الصق البيانات أولاً");return}
  const rows=parsePasteText(paste);
  if(rows.length===0){alert("لم يتم التعرف على بيانات");return}
  rRows=rows;
  document.getElementById("r_form").classList.remove("hidden");
  document.getElementById("r_excelStatus").textContent="✅ تم تحميل "+rows.length+" صف من اللصق";
  document.getElementById("r_excelStatus").className="note status-ok";
}

function r_search(){
  const no=clean(document.getElementById("r_no").value);if(!no){alert("اكتب رقم البلاغ");return}
  rRow=rRows.find(r=>clean(r[findCol(r,["رقم البلاغ","رقمالبلاغ"])])===no);
  if(!rRow){alert("لم يتم العثور");return}

  document.getElementById("r_desc").value=clean(rRow[findCol(rRow,["الوصف","وصف البلاغ"])]);
  document.getElementById("r_note").value=clean(rRow[findCol(rRow,["الملاحظات","ملاحظات"])]);
  document.getElementById("r_result").classList.remove("hidden");
  r_save();
}

function r_save(){
  if(!rRow)return;
  const no=clean(rRow[findCol(rRow,["رقم البلاغ","رقمالبلاغ"])]);
  const phone=clean(rRow[findCol(rRow,["رقم الجوال","الجوال","رقم جوال المستفيد"])]);
  const desc=clean(rRow[findCol(rRow,["الوصف","وصف البلاغ"])]);
  const note=document.getElementById("r_note").value;

  if(!rSaved.some(x=>x["رقم البلاغ"]===no)){
    rSaved.push({"رقم البلاغ":no,"الوصف":desc,"الملاحظة":note,"رقم الجوال":phone,"تاريخ الحفظ":new Date().toLocaleString("ar-SA")});
    localStorage.setItem("rSaved",JSON.stringify(rSaved));
    document.getElementById("r_status").textContent="✅ تم الحفظ تلقائياً";
    document.getElementById("r_status").className="note status-ok";
  }
}

function r_msg(){
  const no=clean(rRow[findCol(rRow,["رقم البلاغ","رقمالبلاغ"])]);
  return `السلام عليكم ورحمة الله وبركاته

لديكم بلاغ رقم: ${no}

الوصف:
${document.getElementById("r_desc").value}

الملاحظة:
${document.getElementById("r_note").value}`;
}

function r_whatsapp(){
  if(!rRow){alert("ابحث أولاً");return}
  const p=phoneFix(rRow[findCol(rRow,["رقم الجوال","الجوال","رقم جوال المستفيد"])]);
  if(!p){alert("لا يوجد رقم جوال");return}
  r_save();
  location.href="https://wa.me/"+p+"?text="+encodeURIComponent(r_msg());
}

async function r_share(){
  if(!rRow){alert("ابحث أولاً");return}
  r_save();
  if(rImgFile&&navigator.canShare&&navigator.canShare({files:[rImgFile]})){await navigator.share({files:[rImgFile],text:r_msg()})}
  else if(navigator.share){await navigator.share({text:r_msg()})}
  else r_copy();
}

async function r_copy(){
  await navigator.clipboard.writeText(r_msg()).catch(()=>{});
  document.getElementById("r_status").textContent="تم النسخ ✅";
  document.getElementById("r_status").className="note status-ok";
}

function r_downloadImg(){
  if(!rImgData){alert("ارفق صورة");return}
  const a=document.createElement("a");a.href=rImgData;a.download="بلاغ.jpg";a.click();
}

function r_export(){exportRows(rSaved,"البلاغات_المحفوظة.xlsx","البلاغات")}


/* ===================== الطلبات ===================== */
let qRows=[];
let qSent=JSON.parse(localStorage.getItem("qSent")||"[]");

setupFileBtn('q_excel','q_excelBtn','q_excelStatus');

document.getElementById("q_excel").addEventListener("change",e=>{
  const f=e.target.files[0];if(!f)return;
  readExcelFile(f,rows=>{qRows=rows;document.getElementById("q_status").textContent="تم إرفاق الملف بنجاح — عدد السجلات: "+rows.length;document.getElementById("q_status").className="note status-ok";document.getElementById("q_searchBox").classList.remove("hidden")},document.getElementById("q_excelStatus"));
});

/* تحميل من لصق */
function q_pasteLoad(){
  const paste=document.getElementById("q_paste").value.trim();
  if(!paste){alert("الصق البيانات أولاً");return}
  const rows=parsePasteText(paste);
  if(rows.length===0){alert("لم يتم التعرف على بيانات");return}
  qRows=rows;
  document.getElementById("q_status").textContent="✅ تم تحميل "+rows.length+" صف من اللصق";
  document.getElementById("q_status").className="note status-ok";
  document.getElementById("q_searchBox").classList.remove("hidden");
}

function q_searchData(){
  const q=clean(document.getElementById("q_search").value).toLowerCase();
  const box=document.getElementById("q_results");box.innerHTML="";
  if(!q){box.innerHTML="<p class='note'>اكتب كلمة للبحث</p>";return}
  const rows=qRows.filter(r=>Object.values(r).some(v=>clean(v).toLowerCase().includes(q)));
  if(!rows.length){box.innerHTML="<p class='note'>لا توجد نتائج</p>";return}

  rows.forEach(row=>{
    const order=clean(row[findCol(row,["رقم الطلب","رقمالطلب"])]);
    const desc=clean(row[findCol(row,["وصف الطلب","وصفالطلب","الوصف"])]);
    const name=clean(row[findCol(row,["اسم المستفيد","إسم المستفيد"])]);
    const phone=phoneFix(row[findCol(row,["رقم جوال المستفيد","رقم الجوال","الجوال","رقم الهاتف"])]);

    const msg=`السلام عليكم ورحمة الله وبركاته

لديكم طلب رقم ${order}

وصف الطلب:
${desc}

نأمل إرسال صورة للملاحظة`;

    const div=document.createElement("div");div.className="item";
    div.innerHTML=`<div><b>رقم الطلب:</b> ${order}</div><div><b>اسم المستفيد:</b> ${name}</div><div><b>الجوال:</b> ${phone||"غير موجود"}</div><div><b>وصف الطلب:</b> ${desc}</div>`;

    const b=document.createElement("button");b.className="btn-green";b.textContent="إرسال واتساب";
    b.onclick=function(){
      if(!phone){alert("لا يوجد رقم جوال");return}
      if(!qSent.some(x=>x["رقم الطلب"]===order)){
        qSent.push({"رقم الطلب":order,"اسم المستفيد":name,"الجوال":phone,"وصف الطلب":desc,"تاريخ الإرسال":new Date().toLocaleDateString("ar-SA"),"وقت الإرسال":new Date().toLocaleTimeString("ar-SA")});
        localStorage.setItem("qSent",JSON.stringify(qSent));
      }
      location.href="https://wa.me/"+phone+"?text="+encodeURIComponent(msg);
    };
    div.appendChild(b);box.appendChild(div);
  });
}

function q_export(){exportRows(qSent,"الطلبات_المحفوظة.xlsx","الطلبات")}


/* ===================== تصدير Excel ===================== */
function exportRows(rows,file,sheet){
  if(!rows||!rows.length){alert("لا يوجد بيانات محفوظة");return}
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),sheet||"Sheet1");
  XLSX.writeFile(wb,file);
}
