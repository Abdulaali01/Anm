<script>
/* ===================== Capacitor Integration ===================== */
const isCapacitor = typeof Capacitor !== 'undefined';

// File picking for Capacitor
async function pickFile(targetId) {
  if (!isCapacitor) {
    // Fallback for web - create hidden input
    let input = document.getElementById(targetId);
    if (!input) {
      input = document.createElement('input');
      input.type = 'file';
      input.id = targetId;
      input.style.display = 'none';
      input.accept = '.xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel';
      document.body.appendChild(input);
    }
    input.onchange = function(e) {
      const f = e.target.files[0];
      if (f) handleFile(targetId, f);
    };
    input.click();
    return;
  }
  
  try {
    const result = await Capacitor.Plugins.Filesystem.requestPermissions();
    // Use native file picker via Capacitor Community File Picker or Camera for files
    // For now, use web fallback within Capacitor WebView
    let input = document.createElement('input');
    input.type = 'file';
    input.accept = '.xlsx,.xls';
    input.onchange = function(e) {
      const f = e.target.files[0];
      if (f) handleFile(targetId, f);
    };
    input.click();
  } catch (e) {
    console.error('File pick error:', e);
  }
}

async function takePhoto() {
  if (!isCapacitor) {
    let input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'camera';
    input.onchange = function(e) {
      oFile = e.target.files[0] || null;
      if (oFile) {
        document.getElementById('o_fileBtn').textContent = '✅ ' + oFile.name;
      }
    };
    input.click();
    return;
  }
  
  try {
    const image = await Capacitor.Plugins.Camera.getPhoto({
      quality: 90,
      allowEditing: false,
      resultType: 'uri'
    });
    // Convert to file object for Tesseract
    const response = await fetch(image.webPath);
    const blob = await response.blob();
    oFile = new File([blob], 'photo.jpg', { type: 'image/jpeg' });
    document.getElementById('o_fileBtn').textContent = '✅ تم التقاط الصورة';
  } catch (e) {
    console.error('Camera error:', e);
  }
}

async function takePhotoForReport() {
  if (!isCapacitor) {
    let input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'camera';
    input.onchange = function(e) {
      const f = e.target.files[0];
      if (!f) return;
      rImgFile = f;
      const fr = new FileReader();
      fr.onload = ev => {
        rImgData = ev.target.result;
        document.getElementById('r_previewImg').src = rImgData;
        document.getElementById('r_previewBox').classList.remove('hidden');
      };
      fr.readAsDataURL(rImgFile);
    };
    input.click();
    return;
  }
  
  try {
    const image = await Capacitor.Plugins.Camera.getPhoto({
      quality: 90,
      allowEditing: false,
      resultType: 'base64'
    });
    rImgData = 'data:image/jpeg;base64,' + image.base64String;
    rImgFile = new File([base64ToBlob(image.base64String, 'image/jpeg')], 'photo.jpg', { type: 'image/jpeg' });
    document.getElementById('r_previewImg').src = rImgData;
    document.getElementById('r_previewBox').classList.remove('hidden');
  } catch (e) {
    console.error('Camera error:', e);
  }
}

function base64ToBlob(base64, type) {
  const byteCharacters = atob(base64);
  const byteNumbers = new Array(byteCharacters.length);
  for (let i = 0; i < byteCharacters.length; i++) {
    byteNumbers[i] = byteCharacters.charCodeAt(i);
  }
  const byteArray = new Uint8Array(byteNumbers);
  return new Blob([byteArray], { type: type });
}

function handleFile(targetId, file) {
  if (targetId === 'o_excelReq') {
    readExcelFile(file, rows => {
      oReqRows = rows;
      document.getElementById('o_reqStatus').textContent = 'تم تحميل طلبات: ' + rows.length;
    }, document.getElementById('o_reqStatus'));
    document.getElementById('o_reqBtn').textContent = '✅ ' + file.name;
  } else if (targetId === 'o_excelInc') {
    readExcelFile(file, rows => {
      oIncRows = rows;
      document.getElementById('o_incStatus').textContent = 'تم تحميل بلاغات: ' + rows.length;
    }, document.getElementById('o_incStatus'));
    document.getElementById('o_incBtn').textContent = '✅ ' + file.name;
  } else if (targetId === 'r_excel') {
    readExcelFile(file, rows => {
      rRows = rows;
      document.getElementById('r_form').classList.remove('hidden');
      document.getElementById('r_excelStatus').textContent = 'تم تحميل: ' + rows.length;
      document.getElementById('r_excelStatus').className = 'note status-ok';
    }, document.getElementById('r_excelStatus'));
    document.getElementById('r_excelBtn').textContent = '✅ ' + file.name;
  } else if (targetId === 'q_excel') {
    readExcelFile(file, rows => {
      qRows = rows;
      document.getElementById('q_status').textContent = 'تم إرفاق الملف بنجاح — عدد السجلات: ' + rows.length;
      document.getElementById('q_status').className = 'note status-ok';
      document.getElementById('q_searchBox').classList.remove('hidden');
    }, document.getElementById('q_excelStatus'));
    document.getElementById('q_excelBtn').textContent = '✅ ' + file.name;
  }
}

// Native Excel Export using Filesystem API
async function exportToExcelNative(rows, fileName, sheetName) {
  if (!rows || !rows.length) {
    alert('لا يوجد بيانات محفوظة');
    return;
  }
  
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), sheetName || 'Sheet1');
  
  // Generate binary string
  const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'binary' });
  
  // Convert to ArrayBuffer
  const buf = new ArrayBuffer(wbout.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < wbout.length; i++) {
    view[i] = wbout.charCodeAt(i) & 0xFF;
  }
  
  if (isCapacitor) {
    try {
      // Save to Downloads or Documents
      const path = 'Download/' + fileName;
      await Capacitor.Plugins.Filesystem.writeFile({
        path: path,
        data: arrayBufferToBase64(buf),
        directory: 'ExternalStorage',
        recursive: true
      });
      alert('تم حفظ الملف: ' + fileName);
      
      // Share the file
      await Capacitor.Plugins.Share.share({
        title: fileName,
        files: [path],
        dialogTitle: 'مشاركة الملف'
      });
    } catch (e) {
      console.error('Export error:', e);
      alert('خطأ في الحفظ: ' + e.message);
    }
  } else {
    // Web fallback
    XLSX.writeFile(wb, fileName);
  }
}

function arrayBufferToBase64(buffer) {
  let binary = '';
  const bytes = new Uint8Array(buffer);
  const len = bytes.byteLength;
  for (let i = 0; i < len; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

// Native Share with WhatsApp
async function shareNative(text, file) {
  if (isCapacitor) {
    try {
      const shareOptions = { text: text };
      if (file) {
        // Save temp file and share
        const base64 = await fileToBase64(file);
        const tempPath = 'temp/' + file.name;
        await Capacitor.Plugins.Filesystem.writeFile({
          path: tempPath,
          data: base64,
          directory: 'Cache',
          recursive: true
        });
        shareOptions.files = [tempPath];
      }
      await Capacitor.Plugins.Share.share(shareOptions);
    } catch (e) {
      console.error('Share error:', e);
      // Fallback to WhatsApp URL
      window.open('https://wa.me/?text=' + encodeURIComponent(text), '_system');
    }
  } else {
    // Web fallback
    if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], text });
    } else {
      window.location.href = 'https://wa.me/?text=' + encodeURIComponent(text);
    }
  }
}

async function shareToWhatsApp(phone, text, file) {
  if (isCapacitor) {
    try {
      const shareOptions = { text: text };
      if (file) {
        const base64 = await fileToBase64(file);
        const tempPath = 'temp/' + file.name;
        await Capacitor.Plugins.Filesystem.writeFile({
          path: tempPath,
          data: base64,
          directory: 'Cache',
          recursive: true
        });
        shareOptions.files = [tempPath];
      }
      await Capacitor.Plugins.Share.share(shareOptions);
    } catch (e) {
      window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(text), '_system');
    }
  } else {
    window.location.href = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(text);
  }
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ===================== دوال عامة ===================== */
function showTab(id) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function clean(v) { return String(v || '').trim() }
function cleanKey(v) { return clean(v).replace(/\s/g, '').toLowerCase() }
function findCol(row, names) {
  const keys = Object.keys(row || {});
  for (const n of names) {
    const f = keys.find(k => cleanKey(k) === cleanKey(n));
    if (f) return f;
  }
  return null;
}
function phoneFix(p) {
  p = clean(p).replace(/\D/g, '');
  if (p.startsWith('966')) return p;
  if (p.startsWith('05')) return '966' + p.substring(1);
  if (p.startsWith('5') && p.length === 9) return '966' + p;
  return p;
}
function readExcelFile(file, cb, msgEl) {
  const r = new FileReader();
  r.onload = function(e) {
    try {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
      cb(rows);
    } catch (err) {
      if (msgEl) msgEl.textContent = 'خطأ في قراءة Excel';
      else alert('خطأ في قراءة Excel');
    }
  };
  r.readAsArrayBuffer(file);
}
function normalizeREQ(raw) {
  let s = clean(raw).toUpperCase().replace(/\s+/g, '').replace(/REO/g, 'REQ');
  const m = s.match(/REQ-?\d{2}-?\d{2}-?\d{5,6}/);
  if (!m) return '';
  return m[0].replace(/^REQ-?/, 'REQ-').replace(/REQ-(\d{2})-?(\d{2})-?(\d+)/, 'REQ-$1-$2-$3');
}
function normalizeINC(raw) {
  let s = clean(raw).toUpperCase().replace(/\s+/g, '');
  const m = s.match(/INC-?\d{2}-?\d{2}-?\d{5,6}/);
  if (!m) return '';
  return m[0].replace(/^INC-?/, 'INC-').replace(/INC-(\d{2})-?(\d{2})-?(\d+)/, 'INC-$1-$2-$3');
}

function parsePasteText(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = lines[0].split('\t');
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split('\t');
    const row = {};
    headers.forEach((h, idx) => { row[h] = cells[idx] || '' });
    rows.push(row);
  }
  return rows;
}

/* ===================== تحليل ===================== */
let oReqRows = [], oIncRows = [], oFile = null;
let oSaved = JSON.parse(localStorage.getItem('oSaved') || '[]');
function o_count() { document.getElementById('o_counter').textContent = 'عدد المحفوظات: ' + oSaved.length }
o_count();

document.getElementById('o_file') && document.getElementById('o_file').addEventListener('change', e => { oFile = e.target.files[0] || null });

function o_pasteAnalyze() {
  const paste = document.getElementById('o_paste').value.trim();
  if (!paste) { alert('الصق البيانات أولاً'); return }

  let req = normalizeREQ(paste);
  let inc = normalizeINC(paste);

  if (!req && !inc) {
    const rows = parsePasteText(paste);
    if (rows.length > 0) {
      oReqRows = rows;
      document.getElementById('o_status').textContent = '✅ تم تحميل ' + rows.length + ' صف من اللصق';
      document.getElementById('o_status').className = 'note status-ok';
      return;
    }
    alert('لم يتم العثور على رقم صحيح أو بيانات جدول');
    return;
  }

  let row = null, type = '', saveKey = req || inc;
  if (req) {
    row = oReqRows.find(r => normalizeREQ(r[findCol(r, ['رقم الطلب', 'رقمالطلب'])]) === req);
    if (row) type = 'طلب';
  }
  if (!row && inc) {
    row = oIncRows.find(r => normalizeINC(r[findCol(r, ['رقم البلاغ', 'رقمالبلاغ'])]) === inc);
    if (row) type = 'بلاغ';
  }
  if (!row) { document.getElementById('o_status').textContent = '❌ غير موجود في البيانات المحملة'; document.getElementById('o_status').className = 'note status-err'; return }

  const linkCol = type === 'طلب' ? findCol(row, ['الموقع', 'موقع الطلب']) : findCol(row, ['موقع البلاغ', 'الموقع']);
  const benefCol = findCol(row, ['رقم المستفيد', 'المستفيد']);
  const phoneCol = findCol(row, ['رقم الجوال', 'رقم جوال المستفيد', 'الجوال']);
  const muniCol = findCol(row, ['البلدية الفرعية']);

  document.getElementById('o_no').value = saveKey;
  document.getElementById('o_link').value = clean(row[linkCol]);
  document.getElementById('o_benef').value = clean(row[benefCol]);
  document.getElementById('o_phone').value = clean(row[phoneCol]);
  document.getElementById('o_muni').value = clean(row[muniCol]);

  if (!oSaved.some(x => x['رقم'] === saveKey)) {
    oSaved.push({ 'رقم': saveKey, 'البلدية الفرعية': clean(row[muniCol]), 'الموقع': clean(row[linkCol]), 'رقم المستفيد': clean(row[benefCol]), 'رقم الجوال': clean(row[phoneCol]), 'النوع': type, 'تاريخ الحفظ': new Date().toLocaleString('ar-SA') });
    localStorage.setItem('oSaved', JSON.stringify(oSaved)); o_count();
  }
  document.getElementById('o_status').textContent = '✅ تم العثور (' + type + ') — تم الحفظ تلقائياً';
  document.getElementById('o_status').className = 'note status-ok';
}

async function o_analyze() {
  let raw = document.getElementById('o_manual').value, req = '', inc = '';
  if (raw) { req = normalizeREQ(raw); inc = normalizeINC(raw) }
  else {
    if (!oFile) { alert('أدخل رقم أو ارفع صورة'); return }
    if (oFile.type.startsWith('video/')) { alert('تحليل الرقم يعمل على الصور فقط'); return }
    document.getElementById('o_status').textContent = 'جاري قراءة الصورة...';
    const res = await Tesseract.recognize(oFile, 'eng', { logger: m => { if (m.progress) document.getElementById('o_status').textContent = 'جاري التحليل ' + Math.round(m.progress * 100) + '%' } });
    req = normalizeREQ(res.data.text); inc = normalizeINC(res.data.text);
  }
  if (!req && !inc) { alert('لم يتم استخراج رقم صحيح'); return }
  let row = null, type = '', saveKey = req || inc;
  if (req) {
    row = oReqRows.find(r => normalizeREQ(r[findCol(r, ['رقم الطلب', 'رقمالطلب'])]) === req);
    if (row) type = 'طلب';
  }
  if (!row && inc) {
    row = oIncRows.find(r => normalizeINC(r[findCol(r, ['رقم البلاغ', 'رقمالبلاغ'])]) === inc);
    if (row) type = 'بلاغ';
  }
  if (!row) { document.getElementById('o_status').textContent = '❌ غير موجود في Excel'; document.getElementById('o_status').className = 'note status-err'; return }

  const linkCol = type === 'طلب' ? findCol(row, ['الموقع', 'موقع الطلب']) : findCol(row, ['موقع البلاغ', 'الموقع']);
  const benefCol = findCol(row, ['رقم المستفيد', 'المستفيد']);
  const phoneCol = findCol(row, ['رقم الجوال', 'رقم جوال المستفيد', 'الجوال']);
  const muniCol = findCol(row, ['البلدية الفرعية']);

  document.getElementById('o_no').value = saveKey;
  document.getElementById('o_link').value = clean(row[linkCol]);
  document.getElementById('o_benef').value = clean(row[benefCol]);
  document.getElementById('o_phone').value = clean(row[phoneCol]);
  document.getElementById('o_muni').value = clean(row[muniCol]);

  if (!oSaved.some(x => x['رقم'] === saveKey)) {
    oSaved.push({ 'رقم': saveKey, 'البلدية الفرعية': clean(row[muniCol]), 'الموقع': clean(row[linkCol]), 'رقم المستفيد': clean(row[benefCol]), 'رقم الجوال': clean(row[phoneCol]), 'النوع': type, 'تاريخ الحفظ': new Date().toLocaleString('ar-SA') });
    localStorage.setItem('oSaved', JSON.stringify(oSaved)); o_count();
  }
  document.getElementById('o_status').textContent = '✅ تم العثور (' + type + ') — تم الحفظ تلقائياً';
  document.getElementById('o_status').className = 'note status-ok';
}

async function o_share() {
  const text = `رقم: ${document.getElementById('o_no').value}
البلدية الفرعية: ${document.getElementById('o_muni').value}
رقم المستفيد: ${document.getElementById('o_benef').value}
رقم الجوال: ${document.getElementById('o_phone').value}
الموقع: ${document.getElementById('o_link').value}`;
  await shareNative(text, oFile);
}

function o_export() { exportToExcelNative(oSaved, 'التحليل_المحفوظ.xlsx', 'التحليل') }

/* ===================== البلاغات ===================== */
let rRows = [], rRow = null, rImgData = null, rImgFile = null;
let rSaved = JSON.parse(localStorage.getItem('rSaved') || '[]');

function r_pasteLoad() {
  const paste = document.getElementById('r_paste').value.trim();
  if (!paste) { alert('الصق البيانات أولاً'); return }
  const rows = parsePasteText(paste);
  if (rows.length === 0) { alert('لم يتم التعرف على بيانات'); return }
  rRows = rows;
  document.getElementById('r_form').classList.remove('hidden');
  document.getElementById('r_excelStatus').textContent = '✅ تم تحميل ' + rows.length + ' صف من اللصق';
  document.getElementById('r_excelStatus').className = 'note status-ok';
}

function r_search() {
  const no = clean(document.getElementById('r_no').value); if (!no) { alert('اكتب رقم البلاغ'); return }
  rRow = rRows.find(r => clean(r[findCol(r, ['رقم البلاغ', 'رقمالبلاغ'])]) === no);
  if (!rRow) { alert('لم يتم العثور'); return }

  document.getElementById('r_desc').value = clean(rRow[findCol(rRow, ['الوصف', 'وصف البلاغ'])]);
  document.getElementById('r_note').value = clean(rRow[findCol(rRow, ['الملاحظات', 'ملاحظات'])]);
  document.getElementById('r_result').classList.remove('hidden');
  r_save();
}

function r_save() {
  if (!rRow) return;
  const no = clean(rRow[findCol(rRow, ['رقم البلاغ', 'رقمالبلاغ'])]);
  const phone = clean(rRow[findCol(rRow, ['رقم الجوال', 'الجوال', 'رقم جوال المستفيد'])]);
  const desc = clean(rRow[findCol(rRow, ['الوصف', 'وصف البلاغ'])]);
  const note = document.getElementById('r_note').value;

  if (!rSaved.some(x => x['رقم البلاغ'] === no)) {
    rSaved.push({ 'رقم البلاغ': no, 'الوصف': desc, 'الملاحظة': note, 'رقم الجوال': phone, 'تاريخ الحفظ': new Date().toLocaleString('ar-SA') });
    localStorage.setItem('rSaved', JSON.stringify(rSaved));
    document.getElementById('r_status').textContent = '✅ تم الحفظ تلقائياً';
    document.getElementById('r_status').className = 'note status-ok';
  }
}

function r_msg() {
  const no = clean(rRow[findCol(rRow, ['رقم البلاغ', 'رقمالبلاغ'])]);
  return `السلام عليكم ورحمة الله وبركاته

لديكم بلاغ رقم: ${no}

الوصف:
${document.getElementById('r_desc').value}

الملاحظة:
${document.getElementById('r_note').value}`;
}

function r_whatsapp() {
  if (!rRow) { alert('ابحث أولاً'); return }
  const p = phoneFix(rRow[findCol(rRow, ['رقم الجوال', 'الجوال', 'رقم جوال المستفيد'])]);
  if (!p) { alert('لا يوجد رقم جوال'); return }
  r_save();
  shareToWhatsApp(p, r_msg(), rImgFile);
}

async function r_share() {
  if (!rRow) { alert('ابحث أولاً'); return }
  r_save();
  await shareNative(r_msg(), rImgFile);
}

async function r_copy() {
  if (isCapacitor) {
    await Capacitor.Plugins.Clipboard.write({ string: r_msg() });
  } else {
    await navigator.clipboard.writeText(r_msg()).catch(() => { });
  }
  document.getElementById('r_status').textContent = 'تم النسخ ✅';
  document.getElementById('r_status').className = 'note status-ok';
}

function r_downloadImg() {
  if (!rImgData) { alert('ارفق صورة'); return }
  if (isCapacitor) {
    Capacitor.Plugins.Filesystem.writeFile({
      path: 'Download/بلاغ.jpg',
      data: rImgData.split(',')[1],
      directory: 'ExternalStorage',
      recursive: true
    }).then(() => alert('تم حفظ الصورة')).catch(e => alert('خطأ: ' + e.message));
  } else {
    const a = document.createElement('a'); a.href = rImgData; a.download = 'بلاغ.jpg'; a.click();
  }
}

function r_removeImg() { rImgData = null; rImgFile = null; document.getElementById('r_previewBox').classList.add('hidden') }

function r_export() { exportToExcelNative(rSaved, 'البلاغات_المحفوظة.xlsx', 'البلاغات') }

/* ===================== الطلبات ===================== */
let qRows = [];
let qSent = JSON.parse(localStorage.getItem('qSent') || '[]');

function q_pasteLoad() {
  const paste = document.getElementById('q_paste').value.trim();
  if (!paste) { alert('الصق البيانات أولاً'); return }
  const rows = parsePasteText(paste);
  if (rows.length === 0) { alert('لم يتم التعرف على بيانات'); return }
  qRows = rows;
  document.getElementById('q_status').textContent = '✅ تم تحميل ' + rows.length + ' صف من اللصق';
  document.getElementById('q_status').className = 'note status-ok';
  document.getElementById('q_searchBox').classList.remove('hidden');
}

function q_searchData() {
  const q = clean(document.getElementById('q_search').value).toLowerCase();
  const box = document.getElementById('q_results'); box.innerHTML = '';
  if (!q) { box.innerHTML = '<p class="note">اكتب كلمة للبحث</p>'; return }
  const rows = qRows.filter(r => Object.values(r).some(v => clean(v).toLowerCase().includes(q)));
  if (!rows.length) { box.innerHTML = '<p class="note">لا توجد نتائج</p>'; return }

  rows.forEach(row => {
    const order = clean(row[findCol(row, ['رقم الطلب', 'رقمالطلب'])]);
    const desc = clean(row[findCol(row, ['وصف الطلب', 'وصفالطلب', 'الوصف'])]);
    const name = clean(row[findCol(row, ['اسم المستفيد', 'إسم المستفيد'])]);
    const phone = phoneFix(row[findCol(row, ['رقم جوال المستفيد', 'رقم الجوال', 'الجوال', 'رقم الهاتف'])]);

    const msg = `السلام عليكم ورحمة الله وبركاته

لديكم طلب رقم ${order}

وصف الطلب:
${desc}

نأمل إرسال صورة للملاحظة`;

    const div = document.createElement('div'); div.className = 'item';
    div.innerHTML = `<div><b>رقم الطلب:</b> ${order}</div><div><b>اسم المستفيد:</b> ${name}</div><div><b>الجوال:</b> ${phone || 'غير موجود'}</div><div><b>وصف الطلب:</b> ${desc}</div>`;

    const b = document.createElement('button'); b.className = 'btn-green'; b.textContent = 'إرسال واتساب';
    b.onclick = function () {
      if (!phone) { alert('لا يوجد رقم جوال'); return }
      if (!qSent.some(x => x['رقم الطلب'] === order)) {
        qSent.push({ 'رقم الطلب': order, 'اسم المستفيد': name, 'الجوال': phone, 'وصف الطلب': desc, 'تاريخ الإرسال': new Date().toLocaleDateString('ar-SA'), 'وقت الإرسال': new Date().toLocaleTimeString('ar-SA') });
        localStorage.setItem('qSent', JSON.stringify(qSent));
      }
      shareToWhatsApp(phone, msg, null);
    };
    div.appendChild(b); box.appendChild(div);
  });
}

function q_export() { exportToExcelNative(qSent, 'الطلبات_المحفوظة.xlsx', 'الطلبات') }
